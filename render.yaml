services:
  - type: web
    name: url-shortener-service
    runtime: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: BASE_URL
        value: https://url-shortener-service.onrender.com

databases:
  - name: url-shortener-db
    plan: free